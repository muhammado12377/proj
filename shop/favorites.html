<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNEKERCLUB | المفضلة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #000; --accent: #ff3e00; --bg: #f5f5f7; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: var(--bg); padding-top: 100px; }
        
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 8%; position: fixed; width: 100%; top: 0;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); z-index: 1000;
        }
        .logo { font-size: 22px; font-weight: 900; text-decoration: none; color: #000; }
        .logo span { color: var(--accent); }

        .container { padding: 0 8%; max-width: 1400px; margin: 0 auto; }
        h1 { margin-bottom: 30px; font-weight: 900; font-size: 32px; }

        .fav-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .fav-card {
            background: #fff; border-radius: 25px; padding: 20px;
            display: flex; flex-direction: column; position: relative;
        }
        .fav-card img { width: 100%; height: 200px; object-fit: contain; transform: rotate(-10deg); }
        .remove-fav {
            position: absolute; top: 15px; left: 15px; background: #eee;
            width: 35px; height: 35px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
        }
        .btn-view {
            background: var(--primary); color: #fff; text-align: center;
            padding: 12px; border-radius: 12px; text-decoration: none;
            margin-top: 15px; font-weight: 700;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">SNEKER<span>CLUB</span></a>
        <div><a href="cart.html" style="text-decoration:none;">🛒 السلة</a></div>
    </nav>

    <div class="container">
        <h1>قائمة المفضلة ❤️</h1>
        <div id="favList" class="fav-grid">
            </div>
    </div>

    <script>
        function loadFavorites() {
            const favs = JSON.parse(localStorage.getItem('sneker_favs')) || [];
            const container = document.getElementById('favList');

            if (favs.length === 0) {
                container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 100px 0;">
                    <h3>قائمة المفضلة فارغة حالياً.</h3>
                    <a href="index.html" style="color: var(--accent);">اكتشف أحدث الأحذية</a>
                </div>`;
                return;
            }

            container.innerHTML = favs.map((p, index) => `
                <div class="fav-card">
                    <span class="remove-fav" onclick="removeFav(${index})">×</span>
                    <img src="${p.img}">
                    <h3 style="margin-top:15px;">${p.name}</h3>
                    <p style="color: var(--accent); font-weight: 700;">$${p.price}</p>
                    <a href="#" onclick='goToDetails(${JSON.stringify(p)})' class="btn-view">مشاهدة التفاصيل</a>
                </div>
            `).join('');
        }

        function removeFav(index) {
            let favs = JSON.parse(localStorage.getItem('sneker_favs')) || [];
            favs.splice(index, 1);
            localStorage.setItem('sneker_favs', JSON.stringify(favs));
            loadFavorites();
        }

        function goToDetails(product) {
            localStorage.setItem('current_view', JSON.stringify(product));
            window.location.href = 'product-details.html';
        }

        window.onload = loadFavorites;
    </script>
</body>
</html>
