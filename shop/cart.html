<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNEKERCLUB | حقيبة المشتريات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #000;
            --accent: #ff3e00;
            --bg: #f5f5f7;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }

        body { background-color: var(--bg); color: var(--primary); padding-top: 100px; min-height: 100vh; }

        /* Navigation */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 8%; position: fixed; width: 100%; top: 0;
            z-index: 1000; backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.8); border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo { font-size: 24px; font-weight: 900; cursor: pointer; text-decoration: none; color: #000; }
        .logo span { color: var(--accent); }

        /* Layout */
        .container {
            display: grid; grid-template-columns: 2fr 1fr;
            gap: 40px; padding: 40px 8%; max-width: 1400px; margin: 0 auto;
        }

        h1 { font-size: 32px; font-weight: 900; margin-bottom: 30px; }

        /* Cart Items */
        .cart-items {
            background: var(--white); border-radius: 30px;
            padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }

        .cart-item {
            display: flex; align-items: center; padding: 20px 0;
            border-bottom: 1px solid #eee; animation: fadeIn 0.5s ease;
        }

        .item-img {
            width: 120px; height: 120px; background: #f9f9f9;
            border-radius: 20px; display: flex; align-items: center;
            justify-content: center; margin-left: 20px;
        }

        .item-img img { width: 90%; transform: rotate(-15deg); }

        .item-info { flex-grow: 1; }
        .item-info h3 { font-size: 18px; margin-bottom: 5px; }
        .item-info p { color: #888; font-size: 14px; }

        .item-price { font-weight: 900; font-size: 18px; }

        .remove-btn {
            background: none; border: none; color: var(--accent);
            cursor: pointer; font-size: 14px; margin-top: 10px; font-weight: bold;
        }

        /* Summary Area */
        .summary {
            background: #000; color: #fff; border-radius: 30px;
            padding: 40px; height: fit-content; position: sticky; top: 120px;
        }

        .summary h2 { margin-bottom: 25px; font-size: 24px; }

        .summary-row {
            display: flex; justify-content: space-between;
            margin-bottom: 15px; font-size: 16px; opacity: 0.8;
        }

        .summary-total {
            display: flex; justify-content: space-between;
            margin-top: 20px; padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
            font-size: 22px; font-weight: 900;
        }

        .checkout-btn {
            background: #fff; color: #000; width: 100%; border: none;
            padding: 20px; border-radius: 50px; font-size: 18px;
            font-weight: 900; margin-top: 30px; cursor: pointer; transition: 0.3s;
        }

        .checkout-btn:hover { background: var(--accent); color: #fff; transform: scale(1.02); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">SNEKER<span>CLUB</span></a>
        <div class="nav-links">
            <a href="index.html" style="text-decoration: none; color: #000; font-weight: 600;">الرئيسية</a>
        </div>
    </nav>

    <div class="container">
        <div class="cart-section">
            <h1>حقيبة المشتريات</h1>
            <div class="cart-items" id="cart-container">
                </div>
        </div>

        <div class="summary">
            <h2>ملخص الطلب</h2>
            <div class="summary-row">
                <span>المجموع الفرعي</span>
                <span id="subtotal">$0.00</span>
            </div>
            <div class="summary-row">
                <span>الشحن التقديري</span>
                <span id="shipping">$20.00</span>
            </div>
            <div class="summary-total">
                <span>الإجمالي</span>
                <span id="total-price">$0.00</span>
            </div>
            <button class="checkout-btn" onclick="alert('شكراً لثقتك! تم تأكيد طلبك بنجاح.')">الدفع الآمن</button>
        </div>
    </div>

    <script>
        // --- محرك السلة الحقيقي ---
        
        // 1. وظائف الذاكرة
        const CartManager = {
            get: () => JSON.parse(localStorage.getItem('sneker_cart')) || [],
            save: (data) => localStorage.setItem('sneker_cart', JSON.stringify(data)),
            remove: (index) => {
                let cart = CartManager.get();
                cart.splice(index, 1);
                CartManager.save(cart);
                renderCart();
            }
        };

        // 2. وظيفة عرض المنتجات
        function renderCart() {
            const cart = CartManager.get();
            const container = document.getElementById('cart-container');
            const subtotalEl = document.getElementById('subtotal');
            const totalEl = document.getElementById('total-price');
            const shipping = 20;

            if (cart.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; padding:50px;">
                        <p style="color:#888; margin-bottom:20px;">حقيبتك فارغة حالياً.</p>
                        <a href="index.html" style="color:#000; font-weight:bold;">العودة للتسوق</a>
                    </div>
                `;
                subtotalEl.innerText = "$0.00";
                totalEl.innerText = "$0.00";
                document.getElementById('shipping').innerText = "$0.00";
                return;
            }

            container.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <div class="item-img"><img src="${item.img || 'https://via.placeholder.com/150'}"></div>
                    <div class="item-info">
                        <h3>${item.name}</h3>
                        <p>المقاس: ${item.size || '42'}</p>
                        <button class="remove-btn" onclick="CartManager.remove(${index})">إزالة المنتج ×</button>
                    </div>
                    <div class="item-price">$${item.price}</div>
                </div>
            `).join('');

            const subtotal = cart.reduce((sum, item) => sum + Number(item.price), 0);
            subtotalEl.innerText = "$" + subtotal.toLocaleString();
            totalEl.innerText = "$" + (subtotal + shipping).toLocaleString();
            document.getElementById('shipping').innerText = "$" + shipping;
        }

        // تشغيل المحرك فور فتح الصفحة
        window.onload = renderCart;
    </script>
</body>
</html>
