<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNEKERCLUB | تفاصيل المنتج</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #000000;
            --accent: #ff3e00;
            --light-gray: #f6f6f6;
            --text-gray: #666;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: var(--white); color: var(--primary); }

        /* Navbar المطور */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 8%; position: fixed; width: 100%; top: 0;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); z-index: 1000;
            border-bottom: 1px solid #eee;
        }
        .logo { font-size: 22px; font-weight: 900; text-decoration: none; color: #000; }
        .logo span { color: var(--accent); }

        .nav-icons { display: flex; align-items: center; gap: 20px; }
        .nav-icons span { cursor: pointer; font-size: 20px; transition: 0.3s; }
        .nav-icons span:hover { color: var(--accent); }

        /* شريط البحث المخفي */
        .search-bar {
            position: absolute; top: 70px; left: 8%; right: 8%;
            background: #fff; padding: 15px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none; z-index: 999;
        }
        .search-bar input { width: 100%; padding: 10px; border: none; outline: none; font-size: 16px; }

        /* Main Container */
        .container { display: flex; flex-wrap: wrap; margin-top: 80px; }

        .gallery-section {
            flex: 1.2; background: var(--light-gray);
            display: flex; align-items: center; justify-content: center;
            padding: 50px; position: sticky; top: 80px; height: calc(100vh - 80px);
        }
        .gallery-section img { max-width: 90%; transform: rotate(-10deg); filter: drop-shadow(0 30px 60px rgba(0,0,0,0.15)); }

        .info-section { flex: 1; padding: 60px 5%; }
        .product-title { font-size: 42px; font-weight: 900; margin: 10px 0; }
        .price-tag { font-size: 28px; font-weight: 700; margin-bottom: 30px; color: var(--accent); }

        /* المقاسات */
        .size-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .size-guide { color: var(--text-gray); text-decoration: underline; cursor: pointer; }
        
        .sizes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; margin-bottom: 40px; }
        .size-item { border: 1px solid #ddd; padding: 15px; border-radius: 8px; text-align: center; cursor: pointer; font-weight: 700; }
        .size-item.active { background: var(--primary); color: var(--white); }

        /* أزرار العمليات */
        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        .btn-main { background: var(--primary); color: var(--white); border: none; padding: 20px; border-radius: 50px; font-size: 18px; font-weight: 700; cursor: pointer; }
        .btn-fav-large { background: transparent; border: 1.5px solid #ddd; padding: 15px; border-radius: 50px; cursor: pointer; font-weight: 700; }

        /* النافذة المنبثقة (Modal) لدليل المقاسات */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-content {
            background: #fff; padding: 40px; border-radius: 25px; max-width: 500px; width: 90%;
            text-align: center; position: relative;
        }
        .close-modal { position: absolute; top: 20px; left: 20px; cursor: pointer; font-size: 24px; font-weight: 900; }
        .size-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .size-table th, .size-table td { border: 1px solid #eee; padding: 10px; }

        @media (max-width: 968px) { .container { flex-direction: column; } .gallery-section { height: 350px; position: static; } }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">SNEKER<span>CLUB</span></a>
        <div class="nav-icons">
            <span onclick="toggleSearch()">🔍</span>
            <span onclick="location.href='favorites.html'">❤️</span>
            <span onclick="location.href='cart.html'">🛒</span>
        </div>
    </nav>

    <div class="search-bar" id="searchBar">
        <input type="text" placeholder="ابحث عن حذائك المفضل..." onkeyup="handleSearch(this)">
    </div>

    <div class="container">
        <div class="gallery-section"><img id="pImg" src=""></div>
        <div class="info-section">
            <h1 id="pName" class="product-title">اسم الحذاء</h1>
            <div id="pPrice" class="price-tag">$0.00</div>
            <p id="pDesc" style="color: #666; margin-bottom: 30px;">وصف الحذاء...</p>

            <div class="size-header">
                <span>اختر المقاس</span>
                <span class="size-guide" onclick="openModal()">دليل المقاسات</span>
            </div>
            <div id="pSizes" class="sizes-grid"></div>

            <div class="btn-group">
                <button class="btn-main" onclick="addToBag()">إضافة إلى حقيبة التسوق</button>
                <button class="btn-fav-large" id="favBtn" onclick="toggleFavorite()">أضف للمفضلة ♡</button>
            </div>
        </div>
    </div>

    <div class="modal" id="sizeModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">×</span>
            <h2>دليل المقاسات</h2>
            <p>اختر مقاسك بناءً على طول القدم (سم)</p>
            <table class="size-table">
                <tr><th>EU</th><th>US</th><th>CM</th></tr>
                <tr><td>40</td><td>7.5</td><td>25</td></tr>
                <tr><td>41</td><td>8</td><td>26</td></tr>
                <tr><td>42</td><td>9</td><td>27</td></tr>
                <tr><td>43</td><td>10</td><td>28</td></tr>
                <tr><td>44</td><td>11</td><td>29</td></tr>
            </table>
        </div>
    </div>

    <script>
        const product = JSON.parse(localStorage.getItem('current_view'));

        window.onload = function() {
            if(!product) return;
            document.getElementById('pName').innerText = product.name;
            document.getElementById('pPrice').innerText = "$" + product.price;
            document.getElementById('pImg').src = product.img;
            document.getElementById('pDesc').innerText = product.desc || "";

            const sizeContainer = document.getElementById('pSizes');
            sizeContainer.innerHTML = product.sizes.map(size => `
                <div class="size-item" onclick="selectSize(this)">${size}</div>
            `).join('');
            
            checkIfFavorite();
        };

        function selectSize(el) {
            document.querySelectorAll('.size-item').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
        }

        // وظائف النافذة المنبثقة
        function openModal() { document.getElementById('sizeModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('sizeModal').style.display = 'none'; }

        // وظائف البحث
        function toggleSearch() {
            const bar = document.getElementById('searchBar');
            bar.style.display = (bar.style.display === 'block') ? 'none' : 'block';
        }

        // وظيفة المفضلة
        function toggleFavorite() {
            let favs = JSON.parse(localStorage.getItem('sneker_favs')) || [];
            const index = favs.findIndex(item => item.name === product.name);
            
            if(index > -1) {
                favs.splice(index, 1);
                document.getElementById('favBtn').innerText = "أضف للمفضلة ♡";
            } else {
                favs.push(product);
                document.getElementById('favBtn').innerText = "تمت الإضافة ❤️";
            }
            localStorage.setItem('sneker_favs', JSON.stringify(favs));
        }

        function checkIfFavorite() {
            let favs = JSON.parse(localStorage.getItem('sneker_favs')) || [];
            if(favs.some(item => item.name === product.name)) {
                document.getElementById('favBtn').innerText = "تمت الإضافة ❤️";
            }
        }

        function addToBag() {
            const size = document.querySelector('.size-item.active');
            if(!size) { alert("اختر المقاس أولاً"); return; }
            let cart = JSON.parse(localStorage.getItem('sneker_cart')) || [];
            cart.push({...product, size: size.innerText});
            localStorage.setItem('sneker_cart', JSON.stringify(cart));
            window.location.href = 'cart.html';
        }
    </script>
</body>
</html>
