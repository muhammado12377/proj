<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNEKERCLUB | المتجر الرئيسي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #000;
            --accent: #ff3e00;
            --gray-light: #f5f5f5;
            --border: #eeeeee;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: #ffffff;
            color: var(--primary);
            overflow-x: hidden;
        }

        /* --- الهيدر العائم --- */
        header {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px 20px;
        }

        .nav-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        /* اللوجو */
        .logo {
            font-size: 28px;
            font-weight: 900;
            cursor: pointer;
            text-decoration: none;
            color: var(--primary);
            letter-spacing: -1px;
        }
        .logo span { color: var(--accent); }

        /* القائمة المركزية */
        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--primary);
            font-weight: 700;
            font-size: 15px;
            transition: 0.3s;
        }
        .nav-links a:hover { color: var(--accent); }

        /* أيقونات السلة والمفضلة */
        .nav-icons {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .icon-btn {
            position: relative;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            transition: 0.3s;
            border-radius: 50%;
        }
        .icon-btn:hover { background: var(--gray-light); }

        .badge {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--accent);
            color: #fff;
            font-size: 10px;
            min-width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 2px solid #fff;
        }

        /* --- قسم البحث --- */
        .search-section {
            max-width: 800px;
            margin: 10px auto 20px;
            padding: 0 20px;
        }

        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        #searchInput {
            width: 100%;
            padding: 14px 25px;
            border-radius: 50px;
            border: 1px solid transparent;
            background: var(--gray-light);
            outline: none;
            font-size: 15px;
            transition: 0.3s;
        }

        #searchInput:focus {
            background: #fff;
            border-color: var(--primary);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        /* --- شريط الفلاتر (البراندات) --- */
        .filters-container {
            max-width: 1200px;
            margin: 0 auto;
            padding-bottom: 15px;
        }

        .filters-wrapper {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 0 20px;
            scrollbar-width: none;
        }
        .filters-wrapper::-webkit-scrollbar { display: none; }

        .filter-btn {
            padding: 10px 25px;
            border-radius: 50px;
            border: 1px solid #e5e5e5;
            background: #fff;
            cursor: pointer;
            white-space: nowrap;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
        }

        .filter-btn:hover { border-color: var(--primary); }
        .filter-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        /* Responsive الجوال */
        @media (max-width: 768px) {
            .nav-links { display: none; } /* إخفاء القائمة في الجوال لتبسيط التصميم */
            .logo { font-size: 22px; }
        }
    </style>
</head>
<body>

<header>
    <div class="nav-container">
        <div class="nav-top">
            <a href="index.html" class="logo">SNEKER<span>CLUB</span></a>
            
            <ul class="nav-links">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="cart.html">طلباتي</a></li>
                <li><a href="contact.html">اتصل بنا</a></li>
             
            </ul>

            <div class="nav-icons">
                <button class="icon-btn" onclick="window.location.href='favorites.html'">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l8.72-8.72 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                    <span class="badge" id="favBadge">0</span>
                </button>
                
                <button class="icon-btn" onclick="window.location.href='cart.html'">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                    <span class="badge" id="cartBadge">0</span>
                </button>
            </div>
        </div>
    </div>

    <div class="search-section">
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="عن ماذا تبحث اليوم؟ (Nike, Air Max...)" oninput="filterProducts()">
        </div>
    </div>

    <div class="filters-container">
        <div class="filters-wrapper">
            <button class="filter-btn active" onclick="setCategory('الكل', this)">الكل</button>
            <button class="filter-btn" onclick="setCategory('Nike', this)">Nike</button>
            <button class="filter-btn" onclick="setCategory('Adidas', this)">Adidas</button>
            <button class="filter-btn" onclick="setCategory('Jordan', this)">Jordan</button>
            <button class="filter-btn" onclick="setCategory('Puma', this)">Puma</button>
            <button class="filter-btn" onclick="setCategory('New Balance', this)">New Balance</button>
        </div>
    </div>
</header>

<script>
    // دالة لتحديث عداد السلة والمفضلة من الذاكرة المحلية
    function updateHeaderStats() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const favs = JSON.parse(localStorage.getItem('favorites')) || [];
        document.getElementById('cartBadge').innerText = cart.length;
        document.getElementById('favBadge').innerText = favs.length;
    }
    
    // التحديث عند التحميل
    window.addEventListener('load', updateHeaderStats);
</script>
<main>
    <div class="products-grid" id="productsContainer">
        <div style="grid-column: 1/-1; text-align: center; padding: 100px; color: #888;">
            <p>جاري تحميل أحدث الأحذية من SNEKERCLUB...</p>
        </div>
    </div>
</main>

<style>
    /* تنسيق شبكة المنتجات */
    .products-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 35px;
        max-width: 1200px;
        margin: 40px auto;
        padding: 0 20px;
    }

    /* تنسيق الكرت */
    .product-card {
        text-decoration: none;
        color: inherit;
        transition: transform 0.4s ease;
        cursor: pointer;
    }

    .product-card:hover { transform: translateY(-10px); }

    .img-wrapper {
        width: 100%;
        aspect-ratio: 1 / 1;
        background-color: #f6f6f6;
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 15px;
    }

    .img-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .info { padding: 5px; }
    .name { font-weight: 700; font-size: 17px; margin-bottom: 5px; }
    .price { font-weight: 900; font-size: 18px; color: var(--primary); }
    
    footer {
        border-top: 1px solid #eee;
        padding: 40px;
        text-align: center;
        margin-top: 50px;
        color: #888;
    }
</style>

<footer>
    <p>&copy; 2026 SNEKERCLUB - جميع الحقوق محفوظة</p>
</footer>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    // تم وضع مفاتيحك هنا
    const SUPABASE_URL = 'https://srmgsvmxsnjvbwpypibk.supabase.co';
    const SUPABASE_KEY = 'Sb_publishable_JtUpCW8_RvG8jEgj9hxnTg_Qlsmfq-a'; 
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    let allProducts = []; 
    let currentCategory = 'الكل';

    // جلب البيانات
    async function loadData() {
        const { data, error } = await supabase
            .from('shoes') // تأكد أن اسم الجدول في Supabase هو shoes
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            console.error('خطأ:', error);
            document.getElementById('productsContainer').innerHTML = "<p>تأكد من إنشاء جدول باسم shoes وتفعيل الـ RLS.</p>";
        } else {
            allProducts = data;
            renderUI(allProducts);
        }
    }

    function renderUI(products) {
        const container = document.getElementById('productsContainer');
        container.innerHTML = '';

        if (products.length === 0) {
            container.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">لا توجد نتائج.</p>';
            return;
        }

        products.forEach(item => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.onclick = () => window.location.href = `product-details.html?id=${item.id}`;

            card.innerHTML = `
                <div class="img-wrapper">
                    <img src="${item.image_url || 'https://via.placeholder.com/400'}" alt="${item.name}">
                </div>
                <div class="info">
                    <div class="name">${item.name}</div>
                    <div class="price">$${item.price}</div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // وظائف الفلترة والبحث المرتبطة بالهيدر
    window.filterProducts = function() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allProducts.filter(p => {
            const matchesSearch = p.name.toLowerCase().includes(searchTerm);
            const matchesCategory = (currentCategory === 'الكل') || (p.name.includes(currentCategory));
            return matchesSearch && matchesCategory;
        });
        renderUI(filtered);
    }

    window.setCategory = function(cat, btn) {
        currentCategory = cat;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        window.filterProducts();
    }

    loadData();
</script>
</body>
</html>
